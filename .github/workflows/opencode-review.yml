name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: review-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.event.comment.body == '/review' &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve base ref
        id: refs
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            echo "base=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            echo "base=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
            BASE=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json baseRefName --jq '.baseRefName' 2>/dev/null || echo "main")
            echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load review prompt
        id: prompt
        run: |
          {
            echo 'content<<PROMPT_EOF'
            sed "s|\${BASE_REF}|${{ steps.refs.outputs.base }}|g" .github/opencode/review-prompt.md
            echo ''
            echo '---'
            echo ''
            echo "PR #${{ github.event.pull_request.number || github.event.issue.number }} in ${{ github.repository }}."
            echo "Base ref: ${{ steps.refs.outputs.base }}"
            echo PROMPT_EOF
          } >> "$GITHUB_OUTPUT"

      - uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/deepseek/deepseek-v4-pro
          use_github_token: true
          prompt: ${{ steps.prompt.outputs.content }}
