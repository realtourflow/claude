name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 508859666048.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: realtourflow-api
  ECS_CLUSTER: realtourflow
  ECS_SERVICE: realtourflow-api
  CONTAINER_NAME: realtourflow-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        working-directory: backend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in new image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Fix target group health check path
        run: |
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names realtourflow-api-tg \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)
          echo "Target group ARN: $TG_ARN"
          aws elbv2 modify-target-group \
            --target-group-arn "$TG_ARN" \
            --health-check-path /api/health \
            --health-check-interval-seconds 30 \
            --healthy-threshold-count 2 \
            --unhealthy-threshold-count 3 \
            --matcher HttpCode=200
          echo "Health check path set to /api/health"

      - name: Ensure ECS service exists with load balancer
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "NONE")

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "Service $ECS_SERVICE is ACTIVE — skipping creation"
          else
            echo "Service missing or inactive — creating $ECS_SERVICE with ALB..."

            TG_ARN=$(aws elbv2 describe-target-groups \
              --names realtourflow-api-tg \
              --query 'TargetGroups[0].TargetGroupArn' \
              --output text)

            aws ecs create-service \
              --cluster $ECS_CLUSTER \
              --service-name $ECS_SERVICE \
              --task-definition realtourflow-api \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-02f8968c5ca21ea26,subnet-06ed2249f5119f057,subnet-0c24e444d546199e3,subnet-09eede0b84bf501cc,subnet-0da3c422cb867d5fb,subnet-04be7c574c90c891e],securityGroups=[sg-0fdd265d2f92c2e2c],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=$TG_ARN,containerName=$CONTAINER_NAME,containerPort=8080" \
              --health-check-grace-period-seconds 120

            echo "Service $ECS_SERVICE created"
          fi

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
